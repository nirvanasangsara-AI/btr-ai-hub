<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BTR AI — 에이전트 네트워크</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'SF Mono','JetBrains Mono','Noto Sans KR',monospace;background:#020617;color:#e2e8f0;overflow:hidden;height:100vh}

/* 3D grid floor */
#grid-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.15}

/* Scanline */
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);pointer-events:none;z-index:100}

.header{position:fixed;top:0;left:0;right:0;z-index:50;padding:8px 16px;background:rgba(2,6,23,0.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between}
.logo{font-size:.85rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(139,92,246,0.8)}
.logo em{font-style:normal;color:#c4b5fd}
.logo a{color:rgba(148,163,184,0.4);text-decoration:none;font-size:.6rem;margin-left:10px;letter-spacing:0}
.status{display:flex;align-items:center;gap:12px;font-size:.6rem;color:rgba(148,163,184,0.5)}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.dot.live{background:#4ade80;box-shadow:0 0 14px rgba(74,222,128,0.8),0 0 28px rgba(74,222,128,0.4)}
.dot.dead{background:#ef4444;box-shadow:0 0 8px rgba(239,68,68,0.5)}

#graph-container{width:100vw;height:100vh;position:relative;z-index:1}

.hud-panel{position:absolute;background:rgba(2,6,23,0.9);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:10px 14px;font-size:.6rem;color:rgba(180,200,230,0.6);z-index:10}
.hud-top-left{top:56px;left:12px}
.hud-top-right{top:56px;right:12px}
.hud-bottom{position:absolute;bottom:12px;left:12px;right:12px;display:flex;gap:8px;z-index:10}
.hud-metric{flex:1;background:rgba(2,6,23,0.9);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,0.06);border-radius:8px;padding:8px 12px;text-align:center}
.hud-metric .val{font-size:1.5rem;font-weight:700}
.hud-metric .lbl{font-size:.55rem;text-transform:uppercase;letter-spacing:1px;color:rgba(148,163,184,0.4)}

.val.blue{color:#60a5fa;text-shadow:0 0 20px rgba(96,165,250,0.6),0 0 40px rgba(96,165,250,0.3)}
.val.green{color:#4ade80;text-shadow:0 0 20px rgba(74,222,128,0.6),0 0 40px rgba(74,222,128,0.3)}
.val.red{color:#f87171;text-shadow:0 0 20px rgba(248,113,113,0.6),0 0 40px rgba(248,113,113,0.3)}
.val.amber{color:#fbbf24;text-shadow:0 0 20px rgba(251,191,36,0.6),0 0 40px rgba(251,191,36,0.3)}

.agent-row{display:flex;align-items:center;gap:6px;padding:3px 0}
.agent-row .name{color:rgba(180,200,230,0.7);width:70px;text-align:right;font-size:.58rem}
.agent-row .bar{flex:1;height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden}
.agent-row .bar-inner{height:100%;border-radius:2px;transition:width .5s;box-shadow:0 0 8px currentColor}

.tooltip{position:absolute;pointer-events:none;background:rgba(2,6,23,0.98);border:1px solid rgba(139,92,246,0.3);border-radius:6px;padding:8px 11px;font-size:.62rem;color:#e2e8f0;max-width:240px;line-height:1.5;box-shadow:0 4px 24px rgba(0,0,0,.8),0 0 30px rgba(139,92,246,0.15);opacity:0;transition:opacity .12s;z-index:200}
.tooltip strong{display:block;color:#f1f5f9;margin-bottom:3px;font-size:.68rem}
.tooltip .meta{color:rgba(148,163,184,0.5);font-size:.55rem}

@keyframes scanline{0%{transform:translateY(-100%)}100%{transform:translateY(100%)}}
.hud-scan{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(139,92,246,0.12),transparent);animation:scanline 4s linear infinite;pointer-events:none;z-index:99}

/* CSS 3D glow for SVG nodes */
.node-3d{filter:drop-shadow(0 4px 12px rgba(0,0,0,0.8)) drop-shadow(0 0 10px var(--glow-color))}
.node-3d.agent{--glow-color:rgba(139,92,246,0.6)}
.node-3d.running{--glow-color:rgba(59,130,246,0.7)}
.node-3d.done{--glow-color:rgba(34,197,94,0.6)}
.node-3d.blocked{--glow-color:rgba(239,68,68,0.7)}
.node-3d.todo{--glow-color:rgba(245,158,11,0.6)}

@media(max-width:768px){
  .hud-panel{font-size:.5rem;padding:6px 10px}
  .hud-bottom{gap:4px}
  .hud-metric .val{font-size:1.1rem}
  .agent-row .name{width:50px;font-size:.5rem}
}
</style>
</head>
<body>
<!-- CSS 3D grid background -->
<div style="position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(139,92,246,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(139,92,246,0.04) 1px,transparent 1px),radial-gradient(ellipse at 50% 80%,rgba(139,92,246,0.08) 0%,transparent 70%);background-size:50px 50px,50px 50px,100% 100%"></div>

<div class="header">
  <div class="logo">BTR <em>AI</em> · NETWORK<a href="/">← Hub</a></div>
  <div class="status">
    <span id="live-dot" class="dot dead"></span>
    <span id="live-text">OFFLINE</span>
    <span id="clock">00:00:00</span>
  </div>
</div>

<div id="graph-container">
  <div class="hud-scan"></div>

  <div class="hud-panel hud-top-left" id="agent-panel">
    <div style="font-size:.5rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;color:rgba(139,92,246,0.6)">◈ AGENTS</div>
    <div id="agent-rows"></div>
  </div>

  <div class="hud-panel hud-top-right">
    <div style="font-size:.5rem;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;color:rgba(139,92,246,0.6)">◈ STATUS</div>
    <div style="display:flex;flex-direction:column;gap:4px">
      <div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:50%;background:#60a5fa;box-shadow:0 0 12px rgba(96,165,250,0.8)"></div><span style="font-size:.55rem">RUNNING</span></div>
      <div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:50%;background:#4ade80;box-shadow:0 0 12px rgba(74,222,128,0.8)"></div><span style="font-size:.55rem">DONE</span></div>
      <div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:50%;background:#f87171;box-shadow:0 0 12px rgba(248,113,113,0.8)"></div><span style="font-size:.55rem">BLOCKED</span></div>
      <div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:50%;background:#fbbf24;box-shadow:0 0 12px rgba(251,191,36,0.8)"></div><span style="font-size:.55rem">TODO</span></div>
      <div style="display:flex;align-items:center;gap:8px"><div style="width:10px;height:10px;border-radius:50%;background:#a78bfa;box-shadow:0 0 12px rgba(167,139,250,0.8)"></div><span style="font-size:.55rem">AGENT</span></div>
    </div>
  </div>

  <div class="hud-bottom">
    <div class="hud-metric"><div class="val blue" id="cnt-running">0</div><div class="lbl">Running</div></div>
    <div class="hud-metric"><div class="val green" id="cnt-done">0</div><div class="lbl">Done</div></div>
    <div class="hud-metric"><div class="val red" id="cnt-blocked">0</div><div class="lbl">Blocked</div></div>
    <div class="hud-metric"><div class="val amber" id="cnt-todo">0</div><div class="lbl">Todo</div></div>
    <div class="hud-metric"><div class="val" style="color:rgba(200,210,240,0.8);text-shadow:0 0 16px rgba(200,210,240,0.3)" id="cnt-total">0</div><div class="lbl">Total</div></div>
  </div>

  <div class="tooltip" id="tooltip"></div>
  <svg id="svg"></svg>
</div>

<script>
// ── D3 Graph ──
const STATUS_COLOR = { running:'#60a5fa', done:'#4ade80', blocked:'#f87171', todo:'#fbbf24', ready:'#fbbf24' };
const STATUS_BG = { running:'#1e3a5f', done:'#14532d', blocked:'#7f1d1d', todo:'#78350f', ready:'#78350f' };
const AGENT_NAMES = ['researcher','developer','data','reviewer','default'];

let simulation, svg, nodeG, linkG, particleG;
let tooltipEl = document.getElementById('tooltip');

setInterval(()=>{document.getElementById('clock').textContent=new Date().toTimeString().slice(0,8)},1000);

function initSVG(){
  svg = d3.select('#svg');
  const defs = svg.append('defs');

  // Radial gradients for 3D sphere
  const colors={purple:{c1:'#ddd6fe',c2:'#8b5cf6',c3:'#4c1d95'},blue:{c1:'#bfdbfe',c2:'#3b82f6',c3:'#1e3a5f'},green:{c1:'#bbf7d0',c2:'#22c55e',c3:'#14532d'},red:{c1:'#fecaca',c2:'#ef4444',c3:'#7f1d1d'},amber:{c1:'#fef3c7',c2:'#f59e0b',c3:'#78350f'}};
  Object.entries(colors).forEach(([name,c])=>{
    const g=defs.append('radialGradient').attr('id','grad-'+name).attr('cx','35%').attr('cy','30%').attr('r','65%');
    g.append('stop').attr('offset','0%').attr('stop-color','rgba(255,255,255,0.9)');
    g.append('stop').attr('offset','15%').attr('stop-color',c.c1);
    g.append('stop').attr('offset','55%').attr('stop-color',c.c2);
    g.append('stop').attr('offset','100%').attr('stop-color',c.c3);
  });
  // Agent gradient
  const ag=defs.append('radialGradient').attr('id','grad-agent').attr('cx','35%').attr('cy','30%').attr('r','65%');
  ag.append('stop').attr('offset','0%').attr('stop-color','rgba(255,255,255,0.95)');
  ag.append('stop').attr('offset','15%').attr('stop-color','#e9d5ff');
  ag.append('stop').attr('offset','55%').attr('stop-color','#8b5cf6');
  ag.append('stop').attr('offset','100%').attr('stop-color','#3b0764');

  // Glow filters
  ['purple','blue','green','red','amber'].forEach((name,i)=>{
    const f=defs.append('filter').attr('id','glow-'+name).attr('x','-100%').attr('y','-100%').attr('width','300%').attr('height','300%');
    f.append('feGaussianBlur').attr('stdDeviation','5').attr('result','blur');
    f.append('feGaussianBlur').attr('stdDeviation','12').attr('result','blur2');
    const m=f.append('feMerge');
    m.append('feMergeNode').attr('in','blur2');
    m.append('feMergeNode').attr('in','blur');
    m.append('feMergeNode').attr('in','SourceGraphic');
  });

  linkG = svg.append('g');
  particleG = svg.append('g');
  nodeG = svg.append('g');

  simulation = d3.forceSimulation()
    .force('link', d3.forceLink().id(d=>d.id).distance(d=>d.source.type==='agent'?170:110).strength(0.4))
    .force('charge', d3.forceManyBody().strength(-700))
    .force('center', d3.forceCenter(window.innerWidth/2, window.innerHeight/2))
    .force('collision', d3.forceCollide().radius(d=>d.type==='agent'?50:28));

  window.addEventListener('resize',()=>{
    simulation.force('center',d3.forceCenter(window.innerWidth/2,window.innerHeight/2));
    simulation.alpha(0.3).restart();
  });
}

function buildGraph(tasks){
  const agentSet=new Set(tasks.map(t=>t.assignee).filter(Boolean));
  AGENT_NAMES.forEach(a=>agentSet.add(a));
  const agentNodes=[...agentSet].map(id=>({
    id:'agent:'+id,label:id,type:'agent',
    taskCount:tasks.filter(t=>t.assignee===id).length,
    runningCount:tasks.filter(t=>t.assignee===id&&t.status==='running').length
  }));
  const agentMap=Object.fromEntries(agentNodes.map(n=>[n.label,n]));

  const taskNodes=tasks.map(t=>({
    id:t.id,label:t.title?t.title.slice(0,16)+(t.title.length>16?'…':''):t.id.slice(0,8),
    type:'task',status:t.status||'todo',assignee:t.assignee,
    summary:t.summary||'',started_at:t.started_at,
    recent:t.started_at&&(Date.now()/1000-t.started_at<600),raw:t
  }));

  const links=[],taskIds=new Set(tasks.map(t=>t.id));
  for(const t of taskNodes){if(t.assignee&&agentMap[t.assignee])links.push({source:'agent:'+t.assignee,target:t.id,type:'assign'});}
  for(const t of tasks){if(t.parents)for(const pid of t.parents)if(taskIds.has(pid))links.push({source:pid,target:t.id,type:'dep'});}
  return {nodes:[...agentNodes,...taskNodes],links,agents:agentNodes};
}

function updateHUD(tasks,agents){
  const cnt={running:0,done:0,blocked:0,todo:0};
  for(const t of tasks){const s=t.status||'todo';cnt[s]=(cnt[s]||0)+1;}
  ['running','done','blocked','todo'].forEach(s=>document.getElementById('cnt-'+s).textContent=cnt[s]);
  document.getElementById('cnt-total').textContent=tasks.length;
  const max=Math.max(1,...agents.map(a=>a.taskCount));
  document.getElementById('agent-rows').innerHTML=agents.map(a=>
    `<div class="agent-row"><span class="name">${a.label}</span><div class="bar"><div class="bar-inner" style="width:${(a.taskCount/max*100).toFixed(0)}%;background:${a.runningCount?'#818cf8':'rgba(139,92,246,0.5)'}"></div></div><span style="font-size:.5rem;color:rgba(148,163,184,0.4);width:20px;text-align:right">${a.taskCount}</span></div>`
  ).join('');
}

function render(data){
  const tasks=data.tasks||[];
  const {nodes,links,agents}=buildGraph(tasks);
  updateHUD(tasks,agents);

  const old=(simulation.nodes&&simulation.nodes())||[];
  const pm=Object.fromEntries(old.map(n=>[n.id,{x:n.x,y:n.y,vx:n.vx,vy:n.vy}]));
  for(const n of nodes)if(pm[n.id])Object.assign(n,pm[n.id]);

  simulation.nodes(nodes);
  simulation.force('link').links(links);
  simulation.alpha(0.5).restart();

  // ── Links ──
  const linkSel=linkG.selectAll('line').data(links,d=>d.source.id+'-'+d.target.id);
  linkSel.exit().remove();
  linkSel.enter().append('line')
    .attr('stroke',d=>d.type==='assign'?'rgba(139,92,246,0.25)':'rgba(51,65,85,0.12)')
    .attr('stroke-width',d=>d.type==='assign'?2.5:1)
    .attr('stroke-dasharray',d=>d.type==='assign'?'10 8':'4 10')
    .attr('opacity',d=>d.type==='assign'?0.7:0.25)
    .merge(linkSel);

  // ── Nodes ──
  const nodeSel=nodeG.selectAll('g.node-g').data(nodes,d=>d.id);
  nodeSel.exit().transition().duration(200).attr('opacity',0).remove();

  const nodeEnter=nodeSel.enter().append('g')
    .attr('class',d=>{
      let cls='node-g node-3d';
      if(d.type==='agent')cls+=' agent';
      else cls+=' '+(d.status||'todo');
      return cls;
    })
    .attr('opacity',0)
    .call(d3.drag()
      .on('start',(evt,d)=>{if(!evt.active)simulation.alphaTarget(0.2).restart();d.fx=d.x;d.fy=d.y;})
      .on('drag',(evt,d)=>{d.fx=evt.x;d.fy=evt.y;})
      .on('end',(evt,d)=>{if(!evt.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;}))
    .on('mouseover',showTooltip).on('mousemove',moveTooltip).on('mouseout',hideTooltip);

  nodeEnter.transition().duration(500).attr('opacity',1);

  // Agent layers
  const ae=nodeEnter.filter(d=>d.type==='agent');
  ae.append('circle').attr('class','a-glow');
  ae.append('circle').attr('class','a-ring');
  ae.append('circle').attr('class','a-sphere');
  ae.append('text').attr('class','a-label').attr('dy','.35em');

  // Task layers
  const te=nodeEnter.filter(d=>d.type==='task');
  te.append('circle').attr('class','t-glow');
  te.append('circle').attr('class','t-sphere');
  te.append('text').attr('class','t-label').attr('dy','.35em');

  const nm=nodeEnter.merge(nodeSel);

  // Agent glow
  const glows={running:'url(#glow-blue)',done:'url(#glow-green)',blocked:'url(#glow-red)',todo:'url(#glow-amber)',ready:'url(#glow-amber)'};
  nm.select('circle.a-glow')
    .attr('r',36).attr('fill','none').attr('stroke','#8b5cf6').attr('stroke-width',6).attr('opacity',0.3)
    .attr('filter','url(#glow-purple)');
  nm.select('circle.a-ring')
    .attr('r',28).attr('fill','none').attr('stroke','#a78bfa').attr('stroke-width',1.5).attr('stroke-dasharray','6 12').attr('opacity',0.5);
  nm.select('circle.a-sphere')
    .attr('r',24).attr('fill','url(#grad-agent)');
  nm.select('text.a-label')
    .text(d=>d.label.toUpperCase()).attr('text-anchor','middle')
    .attr('fill','rgba(220,220,240,0.9)').attr('font-size','.55rem').attr('font-weight','700').attr('letter-spacing','1px');

  // Task glow
  nm.select('circle.t-glow')
    .attr('r',d=>d.recent?18:15).attr('fill','none')
    .attr('stroke',d=>STATUS_COLOR[d.status]||'#f59e0b').attr('stroke-width',5)
    .attr('opacity',d=>d.status==='running'?0.5:0.2)
    .attr('filter',d=>glows[d.status]||null);
  // Task sphere
  const gm={running:'grad-blue',done:'grad-green',blocked:'grad-red',todo:'grad-amber',ready:'grad-amber'};
  nm.select('circle.t-sphere')
    .attr('r',d=>d.recent?14:11).attr('fill',d=>`url(#${gm[d.status]||'grad-amber'})`)
    .attr('opacity',d=>d.status==='done'?0.4:0.95);
  // Task label
  nm.select('text.t-label')
    .text(d=>d.label).attr('text-anchor','middle')
    .attr('fill','rgba(200,210,240,0.45)').attr('font-size','.46rem').attr('dy','1.6em');

  // ── Particles ──
  const al=links.filter(l=>l.type==='assign');
  particleG.selectAll('circle.ep').remove();
  particleG.selectAll('circle.ep').data(al).enter().append('circle')
    .attr('class','ep').attr('r',2.5).attr('fill','#c4b5fd').attr('opacity',0.9);

  simulation.on('tick',()=>{
    linkG.selectAll('line').attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    const t=(Date.now()/2000)%1;
    particleG.selectAll('circle.ep')
      .attr('cx',d=>d.source.x+(d.target.x-d.source.x)*t)
      .attr('cy',d=>d.source.y+(d.target.y-d.source.y)*t);
    nodeG.selectAll('g.node-g').attr('transform',d=>`translate(${d.x},${d.y})`);
  });
}

function showTooltip(evt,d){
  if(d.type==='agent')tooltipEl.innerHTML=`<strong>◈ ${d.label.toUpperCase()}</strong><span class="meta">에이전트 · ${d.taskCount} 태스크 (진행 ${d.runningCount})</span>`;
  else{const s=d.status||'todo',sl={running:'● 진행중',done:'○ 완료',blocked:'◆ 차단',todo:'◇ 대기',ready:'◇ 준비'}[s]||s;
    tooltipEl.innerHTML=`<strong>${d.label}</strong><span class="meta">${sl} · ${d.assignee||'-'}</span>${d.summary?`<div style="font-size:.55rem;color:rgba(148,163,184,0.4);margin-top:4px">${d.summary.slice(0,100)}</div>`:''}`;}
  tooltipEl.style.opacity='1';moveTooltip(evt);
}
function moveTooltip(evt){let x=evt.clientX+12,y=evt.clientY-10;if(x+240>window.innerWidth)x=evt.clientX-240;if(y+100>window.innerHeight)y=evt.clientY-100;tooltipEl.style.left=x+'px';tooltipEl.style.top=y+'px';}
function hideTooltip(){tooltipEl.style.opacity='0';}

async function fetchState(){
  try{const r=await fetch('/api/kanban-state',{cache:'no-store'});if(!r.ok)throw new Error(r.status);
    const data=await r.json();document.getElementById('live-dot').className='dot live';document.getElementById('live-text').textContent='LIVE';render(data);}
  catch(e){document.getElementById('live-dot').className='dot dead';document.getElementById('live-text').textContent='OFFLINE';console.error(e.message);}
}

initSVG();fetchState();setInterval(fetchState,3000);
</script>
</body>
</html>
