<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BTR AI ‚ÄĒ žóźžĚīž†ĄŪäł ŽĄ§ŪäłžõĆŪĀ¨</title>
<script src="https://unpkg.com/three@0.152.0/build/three.min.js"></script>
<script src="https://unpkg.com/3d-force-graph@1.73.0/dist/3d-force-graph.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#020617;color:#e2e8f0;overflow:hidden;font-family:'SF Mono','JetBrains Mono','Noto Sans KR',monospace}

.header{position:fixed;top:0;left:0;right:0;z-index:10;padding:8px 16px;background:rgba(2,6,23,0.92);backdrop-filter:blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;justify-content:space-between}
.logo{font-size:.85rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:rgba(139,92,246,0.8)}
.logo em{font-style:normal;color:#c4b5fd}
.logo a{color:rgba(148,163,184,0.3);text-decoration:none;font-size:.6rem;margin-left:10px}
.status{display:flex;align-items:center;gap:10px;font-size:.6rem;color:rgba(148,163,184,0.5)}
.dot{width:7px;height:7px;border-radius:50%}
.dot.live{background:#4ade80;box-shadow:0 0 12px rgba(74,222,128,0.8)}
.dot.dead{background:#ef4444}

#graph-container{position:fixed;top:44px;left:0;right:0;bottom:120px;z-index:1}

.hud-bottom{position:fixed;bottom:6px;left:12px;right:12px;z-index:5;pointer-events:none}
.task-summary{background:rgba(2,6,23,0.92);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.08);border-radius:8px;padding:12px 16px}
.task-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:.75rem}
.task-row:last-child{margin-bottom:0}
.task-badge{min-width:50px;text-align:center;padding:4px 8px;border-radius:4px;font-weight:700;font-size:.7rem}
.task-badge.running{background:rgba(59,130,246,0.2);color:#60a5fa;border:1px solid rgba(59,130,246,0.3)}
.task-badge.done{background:rgba(34,197,94,0.2);color:#4ade80;border:1px solid rgba(34,197,94,0.3)}
.task-badge.blocked{background:rgba(239,68,68,0.2);color:#f87171;border:1px solid rgba(239,68,68,0.3)}
.task-badge.todo{background:rgba(251,191,36,0.2);color:#fbbf24;border:1px solid rgba(251,191,36,0.3)}
.task-desc{flex:1;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.task-total{text-align:right;color:#64748b;font-size:.65rem;margin-top:4px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.04)}
</style>
</head>
<body>

<div class="header">
  <div class="logo">BTR <em>AI</em> ¬∑ NETWORK<a href="/">‚Üź Hub</a></div>
  <div class="status" id="live-status">
    <span id="live-dot" class="dot dead"></span>
    <span id="live-text">OFFLINE</span>
    <span id="clock">00:00:00</span>
    <span id="session-info" style="margin-left:12px;font-size:.55rem;color:#64748b;border-left:1px solid #334155;padding-left:12px"></span>
  </div>
</div>

<div id="graph-container"></div>

<div class="hud-bottom">
  <div class="task-summary" id="task-summary">
    <div style="color:#94a3b8;font-size:.65rem;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">žßĄŪĖČ ž§ĎžĚł žěĎžóÖ</div>
    <div id="task-list"></div>
    <div class="task-total" id="task-total">žīĚ 0Íįú žěĎžóÖ</div>
  </div>
</div>

<script>
const STATUS_COLOR={running:'#3b82f6',done:'#22c55e',blocked:'#ef4444',todo:'#f59e0b',ready:'#f59e0b'};
const COLOR_HEX={
  agent:'#8b5cf6',
  running:0x3b82f6,done:0x22c55e,blocked:0xef4444,todo:0xf59e0b
};
const AGENT_NAMES=['researcher','developer','data','reviewer','default'];

// --- Sprite label ---
const labelCache=new Map();
function makeLabel(text,color){
  const k=text+'|'+color;
  if(labelCache.has(k))return labelCache.get(k).clone();
  const c=document.createElement('canvas');c.width=768;c.height=192;
  const ctx=c.getContext('2d');
  ctx.font='bold 84px "SF Mono","JetBrains Mono",monospace';
  ctx.fillStyle=color;ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(text,384,96);
  const tex=new THREE.CanvasTexture(c);tex.minFilter=THREE.LinearFilter;
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,depthTest:false,depthWrite:false,transparent:true}));
  sp.scale.set(24,6,1);labelCache.set(k,sp);return sp.clone();
}

// --- Node 3D object ---
function agentNode3D(label){
  const g=new THREE.Group();
  const r=5;
  // Main sphere
  const geo=new THREE.SphereGeometry(r,32,32);
  const mat=new THREE.MeshPhongMaterial({color:0x8b5cf6,emissive:0x5b21b6,emissiveIntensity:0.6,shininess:40,specular:0xddd6fe});
  g.add(new THREE.Mesh(geo,mat));
  // Glow halo
  const hGeo=new THREE.SphereGeometry(r*1.6,32,32);
  const hMat=new THREE.MeshBasicMaterial({color:0x8b5cf6,transparent:true,opacity:0.08,depthWrite:false});
  g.add(new THREE.Mesh(hGeo,hMat));
  // Outer ring
  const tGeo=new THREE.TorusGeometry(r*1.25,0.3,16,32);
  const tMat=new THREE.MeshBasicMaterial({color:0xa78bfa,transparent:true,opacity:0.25,depthWrite:false});
  g.add(new THREE.Mesh(tGeo,tMat));
  // Label
  const lbl=makeLabel(label.toUpperCase(),'#e2e8f0');
  lbl.position.y=r+3;g.add(lbl);
  return g;
}

function taskNode3D(status,label){
  const g=new THREE.Group();
  const r=3,hex=COLOR_HEX[status]||0xf59e0b;
  const geo=new THREE.SphereGeometry(r,24,24);
  const mat=new THREE.MeshPhongMaterial({color:hex,emissive:hex,emissiveIntensity:0.4,shininess:30});
  g.add(new THREE.Mesh(geo,mat));
  // Label
  const lbl=makeLabel(label,'rgba(200,210,240,0.5)');
  lbl.position.y=r+2;g.add(lbl);
  return g;
}

// --- Graph init ---
const el=document.getElementById('graph-container');
const Graph=ForceGraph3D()(el)
  .backgroundColor('#020617')
  .showNavInfo(false)
  .nodeThreeObject(d=>d.type==='agent'?agentNode3D(d.label):taskNode3D(d.status,d.label))
  .nodeLabel('') // disable HTML labels, using sprites instead
  .linkWidth(1)
  .linkOpacity(0.15)
  .linkColor(l=>l.type==='assign'?'#8b5cf6':'#334155')
  .linkDirectionalParticles(l=>l.type==='assign'?3:0)
  .linkDirectionalParticleSpeed(0.003)
  .linkDirectionalParticleWidth(1.2)
  .linkDirectionalParticleColor(()=>'#c4b5fd')
  .linkDirectionalParticleResolution(32)
  .enableNavigationControls(true)
  .enableNodeDrag(true)
  .nodeRelSize(1)
  .cooldownTicks(40)
  .warmupTicks(20)
  .graphData({nodes:[],links:[]});

// Lighting
const scene=Graph.scene();
scene.add(new THREE.AmbientLight(0x303050,1.2));
const dl=new THREE.DirectionalLight(0xffffff,0.7);
dl.position.set(1,1,1);scene.add(dl);
const dl2=new THREE.DirectionalLight(0x8b5cf6,0.3);
dl2.position.set(-1,-0.5,-0.5);scene.add(dl2);

// Camera - Ž™®Žď† ŽÖłŽďúÍįÄ ŪôĒŽ©īžóź Ž≥īžĚīŽŹĄŽ°Ě ž§Ć žēĄžõÉ
Graph.cameraPosition({x:0,y:0,z:350});

// --- Clock ---
setInterval(()=>{document.getElementById('clock').textContent=new Date().toTimeString().slice(0,8)},1000);

// --- Build graph ---
function buildGraph(tasks){
  const agentSet=new Set(tasks.map(t=>t.assignee).filter(Boolean));
  AGENT_NAMES.forEach(a=>agentSet.add(a));
  const agents=[...agentSet].map(id=>({
    id:'agent:'+id,label:id,type:'agent',
    taskCount:tasks.filter(t=>t.assignee===id).length
  }));
  const am=Object.fromEntries(agents.map(n=>[n.label,n]));

  const taskNodes=tasks.map(t=>({
    id:t.id,label:t.title?t.title.slice(0,12)+(t.title.length>12?'‚Ä¶':''):t.id.slice(0,6),
    type:'task',status:t.status||'todo',assignee:t.assignee
  }));

  const links=[],tids=new Set(tasks.map(t=>t.id));
  for(const t of taskNodes){if(t.assignee&&am[t.assignee])links.push({source:'agent:'+t.assignee,target:t.id,type:'assign'});}
  for(const t of tasks){if(t.parents)for(const p of t.parents)if(tids.has(p))links.push({source:p,target:t.id,type:'dep'});}
  return {nodes:[...agents,...taskNodes],links};
}

// --- Fetch & render ---
let lastIds='';
async function fetchState(){
  try{
    const r=await fetch('/api/kanban-state',{cache:'no-store'});
    if(!r.ok)throw new Error(r.status);
    const data=await r.json();
    const tasks=data.tasks||[];

    // ŪēėŽč® žěĎžóÖ žÉĀžĄł ž†ēŽ≥ī žóÖŽćįžĚīŪäł
    const STATUS_LABELS={running:'žč§ŪĖČ ž§Ď',done:'žôĄŽ£Ć',blocked:'ŽĆÄÍłį',todo:'žėąž†ē'};
    const taskList=document.getElementById('task-list');
    const byStatus={running:[],done:[],blocked:[],todo:[]};
    for(const t of tasks){
      const s=t.status||'todo';
      if(!byStatus[s])byStatus[s]=[];
      byStatus[s].push(t);
    }
    
    let html='';
    for(const status of ['running','blocked','todo','done']){
      const list=byStatus[status]||[];
      if(list.length===0)continue;
      for(const t of list.slice(0,3)){  // ÍįĀ žÉĀŪÉúŽ≥Ą žĶúŽĆÄ 3Íįú
        const title=t.title||t.id.slice(0,8);
        const assignee=t.assignee?`[${t.assignee}]`:'';
        html+=`<div class="task-row"><div class="task-badge ${status}">${STATUS_LABELS[status]}</div><div class="task-desc">${assignee} ${title}</div></div>`;
      }
    }
    taskList.innerHTML=html||'<div style="color:#64748b;font-size:.7rem">žßĄŪĖČ ž§ĎžĚł žěĎžóÖ žóÜžĚĆ</div>';
    document.getElementById('task-total').textContent=`žīĚ ${tasks.length}Íįú žěĎžóÖ`;

    // Only re-graph if structure changed
    const ids=JSON.stringify(tasks.map(t=>t.id).sort());
    if(ids!==lastIds){
      const gd=buildGraph(tasks);
      // Distance based on node type
      Graph.dagMode(null);
      Graph.d3Force('link').distance(l=>l.source.type==='agent'?80:50);
      Graph.d3Force('charge').strength(-200);
      Graph.graphData(gd);
      lastIds=ids;
    }

    document.getElementById('live-dot').className='dot live';
    document.getElementById('live-text').textContent='LIVE';
    
    // ŪėĄžě¨ žĄłžÖė ž†ēŽ≥ī ŪĎúžčú
    if(data.current_session){
      const s=data.current_session;
      document.getElementById('session-info').innerHTML=`ūüĒĶ ${s.model||'unknown'} ¬∑ ${s.turn||0}ŪĄī ¬∑ ${s.platform||'?'}`;
    }
  }catch(e){
    console.error('fetchState error:',e.message);
    document.getElementById('live-dot').className='dot dead';
    document.getElementById('live-text').textContent='OFFLINE';
  }
}

setTimeout(fetchState,200);
setInterval(fetchState,3000);

// Resize
window.addEventListener('resize',()=>{Graph.width(el.clientWidth).height(el.clientHeight);});
</script>
</body>
</html>
<script>
// ÍĪīÍįēŽŹĄ ŪĎúžčú (žöįžÉĀŽč®)
async function loadHealth() {
  try {
    const r = await fetch('/api/agent-health');
    const d = await r.json();
    const curr = d.current;
    if (!curr) return;
    
    const score = curr.health_score || 0;
    const color = score > 80 ? '#10b981' : score > 50 ? '#f59e0b' : '#ef4444';
    const arrow = d.history.length > 1 ? (curr.health_score > d.history[1].health_score ? '‚Üó' : '‚Üė') : '';
    
    document.getElementById('live-status').insertAdjacentHTML('afterend', `
      <div style="position:absolute;top:16px;right:16px;background:#0f172a;border:1px solid #334155;padding:8px 12px;border-radius:6px;font-size:.75rem">
        <div style="color:#94a3b8">‚ö° Health</div>
        <div style="color:${color};font-size:1.5rem;font-weight:bold">${score.toFixed(0)} ${arrow}</div>
        <div style="color:#64748b;font-size:.65rem">${curr.avg_turn_sec}s/turn</div>
      </div>
    `);
  } catch (e) { console.warn('Health load failed', e); }
}

setTimeout(loadHealth, 1000);
</script>
