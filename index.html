<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BTR AI Hub</title>
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="stylesheet" href="/cost-modal.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}

.header{padding:10px 14px;border-bottom:1px solid #1e293b;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.25rem;font-weight:800;color:#fff;letter-spacing:-.5px}
.logo span{color:#facc15}
.header-right{display:flex;align-items:center;gap:12px}
.last-updated{font-size:.72rem;color:#475569}
.login-btn{font-size:.75rem;color:#475569;padding:5px 12px;border:1px solid #1e293b;border-radius:6px;cursor:pointer;background:transparent;transition:.15s}
.login-btn:hover{color:#94a3b8;border-color:#334155}
.login-btn.owner{color:#facc15;border-color:#854d0e}

.section{padding:12px 14px 0}
.section-label{font-size:.7rem;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}

/* 모바일: 항상 2열, 타이트 */
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;padding:0 14px 14px}
.card{background:#1e293b;border:1px solid #1e3a5f;border-radius:10px;padding:10px 10px 8px;text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:0;transition:all .15s;position:relative;overflow:hidden;cursor:pointer}
.card:hover{border-color:#4ade80;box-shadow:0 4px 20px rgba(74,222,128,.12);transform:translateY(-1px)}
.card.hidden-card{border-color:#374151;opacity:.65}
.card.hidden-card:hover{border-color:#6b7280}
.card-top{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.card-icon{font-size:1.1rem;width:22px;text-align:center;flex-shrink:0}
.card-name{font-size:.78rem;font-weight:700;color:#f1f5f9;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.live-dot{width:6px;height:6px;background:#4ade80;border-radius:50%;flex-shrink:0;animation:pulse 2.5s infinite}
.hidden-dot{width:6px;height:6px;background:#6b7280;border-radius:50%;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.85)}}
.card-desc{font-size:.68rem;color:#64748b;line-height:1.4;margin-bottom:6px;min-height:0;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:flex-end;justify-content:space-between;margin-top:auto}
.card-clicks{font-size:.6rem;color:#334155;font-variant-numeric:tabular-nums}
/* 스파크라인 — 숫자 포함 */
.sparkline{display:flex;align-items:flex-end;gap:2px;height:36px}
.spark-col{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.spark-num{font-size:.46rem;color:#475569;line-height:1.2;font-variant-numeric:tabular-nums;min-height:7px}
.spark-num.sn-today{color:#4ade80;font-weight:700}
.spark-num.sn-zero{visibility:hidden}
.sparkline-bar{width:5px;border-radius:2px 2px 0 0;background:#1d4ed8;min-height:2px;transition:height .3s}
.sparkline-bar.today{background:#4ade80}

/* 데스크탑: auto-fill, 조금 더 여유 */
@media(min-width:640px){
  .header{padding:14px 20px}
  .section{padding:14px 20px 0}
  .grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:10px;padding:0 20px 20px}
  .card{padding:12px 12px 10px;border-radius:12px}
  .card-top{gap:9px;margin-bottom:4px}
  .card-icon{font-size:1.25rem;width:28px}
  .card-name{font-size:.84rem;white-space:normal;overflow:visible;text-overflow:unset}
  .card-desc{font-size:.72rem;min-height:0;-webkit-line-clamp:2}
  .card-clicks{font-size:.64rem}
  .sparkline{height:38px}
  .spark-num{font-size:.5rem;min-height:8px}
  .sparkline-bar{width:6px}
  /* 비용 카드도 auto-fill로 통일 (위와 열 수 맞춤) */
  .cost-grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}
}

/* 오너뷰 토글 버튼 */
.toggle-vis{position:absolute;top:10px;right:10px;font-size:.7rem;padding:2px 8px;border-radius:6px;border:1px solid #374151;background:#0f172a;color:#6b7280;cursor:pointer;z-index:2;transition:.15s}

/* API 비용 카드 */
.cost-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;padding:0 28px 20px}
@media(min-width:640px){.cost-grid{grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}}
.cost-card{background:#1e293b;border:1px solid #1e3a5f;border-radius:12px;padding:12px;transition:border-color .15s}
@media(min-width:640px){.cost-card{padding:16px}}
.cost-card:hover{border-color:#4ade80}
.toggle-vis:hover{border-color:#6b7280;color:#94a3b8}
.toggle-vis.visible{border-color:#1d4ed8;color:#60a5fa}

/* 드래그 앤 드롭 */
.card[draggable="true"]{cursor:grab}
.card[draggable="true"]:active{cursor:grabbing}
.card.dragging{opacity:.35;border-style:dashed;border-color:#475569;transform:none!important;box-shadow:none!important}
.card.drag-over{border-color:#facc15!important;box-shadow:0 0 0 2px #facc1566!important;transform:scale(1.02)!important}
.drag-save-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;border:1px solid #4ade80;color:#4ade80;font-size:.75rem;padding:6px 18px;border-radius:99px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.drag-save-toast.show{opacity:1}

/* 오너뷰 토글 버튼 */
.cost-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cost-name{font-size:.85rem;font-weight:700;color:#f1f5f9}
.cost-rows{display:flex;flex-direction:column;gap:6px;margin-bottom:12px}
.cost-row{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;border-radius:6px;background:#0f172a}
.cost-row-label{font-size:.72rem;color:#64748b;display:flex;align-items:center;gap:5px}
.cost-badge{font-size:.62rem;padding:1px 6px;border-radius:99px;font-weight:700}
.badge-api{background:#1e3a5f;color:#60a5fa}
.badge-sub{background:#1a2e1a;color:#4ade80}
.badge-infra{background:#2d1f3d;color:#a78bfa}
.cost-row-val{font-size:.85rem;font-weight:700;color:#f1f5f9;font-variant-numeric:tabular-nums}
.cost-row-val.loading{color:#475569}
.cost-row-val.manual{color:#f59e0b}
.cost-divider{border:none;border-top:1px solid #1e3a5f;margin:8px 0}
.cost-total-row{display:flex;align-items:center;justify-content:space-between;padding:0 2px}
.cost-total-label{font-size:.72rem;color:#94a3b8;font-weight:600}
.cost-total-val{font-size:1rem;font-weight:800;color:#4ade80;font-variant-numeric:tabular-nums}
.cost-link{font-size:.68rem;color:#3b82f6;text-decoration:none;display:block;margin-top:8px;text-align:right}
.cost-link:hover{color:#60a5fa}
.cost-manual-btn{font-size:.65rem;color:#f59e0b;background:none;border:1px solid #78350f;border-radius:4px;padding:2px 8px;cursor:pointer}
.cost-total-summary{background:#0f172a;border:1px solid #22c55e;border-radius:12px;padding:16px 20px;margin:0 28px 16px}
.cts-title{font-size:.7rem;color:#94a3b8;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px}
.cts-rows{display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:10px}
@media(min-width:640px){.cts-rows{grid-template-columns:repeat(auto-fill,minmax(210px,1fr))}}
.cts-item{display:flex;flex-direction:column;gap:2px}
.cts-label{font-size:.68rem;color:#64748b}
.cts-val{font-size:1.1rem;font-weight:700;color:#f1f5f9;font-variant-numeric:tabular-nums}
.cts-grand{font-size:1.5rem;font-weight:800;color:#4ade80;margin-top:4px}
.cts-note{font-size:.65rem;color:#475569;margin-top:6px}
/* 로그인 모달 */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:28px 32px;width:320px}
.modal h3{font-size:1rem;font-weight:700;margin-bottom:16px;color:#f1f5f9}
.modal input{width:100%;background:#0f172a;border:1px solid #334155;border-radius:8px;padding:10px 14px;color:#f1f5f9;font-size:.9rem;margin-bottom:12px}
.modal input:focus{outline:none;border-color:#3b82f6}
.modal-btns{display:flex;gap:8px;justify-content:flex-end}
.btn-cancel{padding:7px 16px;border-radius:8px;border:1px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;font-size:.85rem}
.btn-login{padding:7px 16px;border-radius:8px;border:none;background:#1d4ed8;color:#fff;cursor:pointer;font-size:.85rem;font-weight:600}
.btn-login:hover{background:#2563eb}
.modal-err{font-size:.75rem;color:#f87171;min-height:18px;margin-bottom:4px}

/* 오너 배지 */
.owner-badge{background:#78350f;color:#facc15;font-size:.65rem;padding:2px 8px;border-radius:99px;font-weight:700}

.footer{padding:16px 28px;border-top:1px solid #1e293b;text-align:center;font-size:.7rem;color:#334155}
</style>
</head>

  </div>
</div>

<div class="section">
  <div class="section-label" id="svc-label">🚀 서비스</div>

  <div style="padding:40px;color:#475569;text-align:center">로딩 중…</div>
</div>

    <div class="modal-btns">

let OWNER_TOKEN = '';
let ALL_SERVICES = [];

// 로그인 상태 복원
const saved = sessionStorage.getItem('owner_token');
if (saved) { IS_OWNER = true; OWNER_TOKEN = saved; }

function toggleLogin() {
  if (IS_OWNER) { logout(); return; }
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}
function closeModal() {
  document.getElementById('modal-bg').classList.remove('open');
  document.getElementById('pw-input').value = '';
  document.getElementById('modal-err').textContent = '';
}
async function doLogin() {
  const pw = document.getElementById('pw-input').value;
  try {
    const r = await fetch('/api/admin-login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({password: pw})
    });
    const d = await r.json();
    if (d.ok) {
      IS_OWNER = true;
      OWNER_TOKEN = d.token;
      sessionStorage.setItem('owner_token', d.token);
      closeModal();
      applyOwnerView();
    } else {
      document.getElementById('modal-err').textContent = '비밀번호가 틀렸습니다';
    }
  } catch(e) {
    document.getElementById('modal-err').textContent = '연결 오류';
  }
}
function logout() {
  IS_OWNER = false;
  OWNER_TOKEN = '';
  sessionStorage.removeItem('owner_token');
  location.reload();
}

function applyOwnerView() {
  document.getElementById('owner-badge').style.display = '';
  document.getElementById('login-btn').textContent = '🚪 로그아웃';
  document.getElementById('login-btn').classList.add('owner');
  document.getElementById('cost-section').style.display = '';
  renderGrid(ALL_SERVICES, true);
  initDrag();
  loadAiCosts();
}

// 카드 색상 정의
const CARD_STYLES = {
  hyundaiPurple: { name:'현대카드 퍼플 ••3202', bg:'linear-gradient(135deg,#2d1b69 0%,#5b2d8e 45%,#7c3aed 100%)', accent:'#e879f9', logo:'💳', chip:'#d4b4fe' },
  hyundai3202:   { name:'현대카드 ••3202', bg:'linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%)', accent:'#e94560', logo:'💳', chip:'#c9a84c' },
  hyundai6313:   { name:'현대카드 6313', bg:'linear-gradient(135deg,#0d0d0d 0%,#1a1a1a 50%,#2d2d2d 100%)', accent:'#fff', logo:'💳', chip:'#b8a060' },
  unknown:       { name:'카드 미확인', bg:'linear-gradient(135deg,#1e293b 0%,#334155 100%)', accent:'#94a3b8', logo:'❓', chip:'#64748b' },

// 수동 입력 저장소 (sessionStorage)
function getManualCosts() {
  try { return JSON.parse(sessionStorage.getItem('manual_costs') || '{}'); } catch{ return {}; }
}
function setManualCost(key, usd) {
  const m = getManualCosts(); m[key] = usd;
  sessionStorage.setItem('manual_costs', JSON.stringify(m));
}

async function loadAiCosts() {
  const grid = document.getElementById('cost-grid');
  grid.innerHTML = '<div style="color:#475569;font-size:.8rem;padding:20px">Worker에서 데이터 조회 중…</div>';

  let workerData = null;
  try {
    const r = await fetch('/api/ai-costs', {
      headers: { 'X-Admin-Token': OWNER_TOKEN }
    });
    if (r.ok) workerData = await r.json();
  } catch(e) { console.warn('ai-costs 조회 실패', e); }

  const manual = getManualCosts();

  // 카드 렌더
  let sumSub = 0, sumApi = 0, sumInfra = 0;
  const cards = COST_CONFIG.map(cfg => {
    const wd = workerData && workerData.services && workerData.services[cfg.key];
    const subUsd = cfg.sub || 0;
    if (cfg.isInfra) sumInfra += subUsd;
    else sumSub += subUsd;

    // API 금액 결정
    let apiUsd = null, apiLabel = '—', apiClass = 'loading', apiNote = '';
    if (cfg.key === 'anthropic_api' && wd && wd.api) {
      if (wd.api.total_usd !== undefined && wd.api.total_usd !== null) {
        apiUsd = wd.api.total_usd;
        apiLabel = `$${Number(apiUsd).toFixed(2)}`;
        apiClass = '';
        apiNote = wd.api.month ? ` (${wd.api.month})` : '';
      } else {
        apiLabel = wd.api.note || '데이터 없음';
        apiClass = 'loading';
      }
    } else if (cfg.key === 'openrouter' && wd && wd.api) {
      if (wd.api.usage_usd !== undefined && wd.api.usage_usd !== null) {
        apiUsd = wd.api.usage_usd;
        apiLabel = `$${Number(apiUsd).toFixed(4)}`;
        apiClass = '';
        apiNote = wd.api.limit_usd ? ` (한도 $${wd.api.limit_usd})` : '';
      } else if (wd.api.error) {
        apiLabel = wd.api.error;
        apiClass = 'loading';
      }
    } else if (cfg.key === 'anthropic' && wd && wd.api) {
      if (wd.api.estimated_usd !== undefined && wd.api.estimated_usd !== null) {
        apiUsd = wd.api.estimated_usd;
        apiLabel = `~$${Number(apiUsd).toFixed(2)}`;
        apiClass = '';
        apiNote = ' (추정)';
      } else if (wd.api.error) {
        apiLabel = wd.api.error;
        apiClass = 'loading';
      }
    } else if (cfg.key === 'deepseek' && wd && wd.api && wd.api.balance_usd !== undefined && wd.api.balance_usd !== null) {
      apiUsd = null; // 잔액이지 사용량 아님
      apiLabel = `잔액 $${Number(wd.api.balance_usd).toFixed(2)}`;
      apiClass = '';
      apiNote = wd.api.balance_cny ? ` (¥${Number(wd.api.balance_cny).toFixed(2)})` : '';
    } else if (cfg.key === 'openai' && wd && wd.api) {
      if (wd.api.total_used !== undefined) {
        apiUsd = wd.api.total_used;
        apiLabel = `$${Number(apiUsd).toFixed(2)}`;
        apiClass = '';
      } else if (wd.api.ctx_tokens) {
        apiLabel = `${((wd.api.ctx_tokens||0)+(wd.api.gen_tokens||0)).toLocaleString()}토큰`;
        apiClass = '';
        apiNote = ' (비용직접확인)';
      }
    }
    // 수동 입력 우선
    if (manual[cfg.key] !== undefined) {
      apiUsd = manual[cfg.key];
      apiLabel = `$${Number(apiUsd).toFixed(2)}`;
      apiClass = 'manual';
      apiNote = ' ✏️';
    }
    if (apiUsd !== null && !cfg.isInfra) sumApi += apiUsd;

    // 크레딧제 (Manus 등) 처리
    let creditRow = '';
    if (cfg.creditTotal) {
      const used = cfg.creditUsed || 0;
      const remain = cfg.creditTotal - used;
      const pct = Math.round(used / cfg.creditTotal * 100);
      creditRow = `
      <div class="cost-row" style="flex-direction:column;gap:4px">
        <div style="display:flex;justify-content:space-between;width:100%">
          <span class="cost-row-label"><span class="cost-badge badge-api">크레딧</span>사용 ${used.toLocaleString()} / ${cfg.creditTotal.toLocaleString()}</span>
          <span class="cost-row-val">${remain.toLocaleString()} 남음</span>
        </div>
        <div style="width:100%;height:4px;background:#1e293b;border-radius:2px">
          <div style="width:${pct}%;height:4px;background:#f59e0b;border-radius:2px"></div>
        </div>
      </div>`;
    }

    const totalUsd = subUsd + (apiUsd || 0);
    if (totalUsd > 0 && !cfg.isInfra) {} // sumSub/sumApi 이미 포함

    const subRow = subUsd > 0 || cfg.subName ? `
      <div class="cost-row">
        <span class="cost-row-label"><span class="cost-badge badge-sub">구독</span>${cfg.subName || '—'}</span>
        <span class="cost-row-val">${subUsd > 0 ? '$'+subUsd.toFixed(2) : '—'}</span>
      </div>` : '';

    // API행: 자동조회 서비스이거나, 수동입력값이 있으면 무조건 표시
    const showApiRow = cfg.apiAuto || cfg.key === 'anthropic' || cfg.key === 'openrouter' ||
      cfg.key === 'gemini' || manual[cfg.key] !== undefined;
    const apiRow = (showApiRow && !cfg.isInfra) ? `
      <div class="cost-row">
        <span class="cost-row-label"><span class="cost-badge badge-api">API</span>이달 사용${apiNote}</span>
        <span class="cost-row-val ${apiClass}">${apiLabel}</span>
      </div>` : '';

    const infraRow = cfg.isInfra && subUsd > 0 ? `
      <div class="cost-row">
        <span class="cost-row-label"><span class="cost-badge badge-infra">인프라</span>${cfg.subName || cfg.label}</span>
        <span class="cost-row-val">$${subUsd.toFixed(2)}/월</span>
      </div>` : '';

    const totalRow = (subUsd > 0 && showApiRow && !cfg.isInfra) ? `
      <hr class="cost-divider"/>
      <div class="cost-total-row">
        <span class="cost-total-label">합계</span>
        <span class="cost-total-val">$${totalUsd.toFixed(2)}</span>
      </div>` : '';

    const manualBtn = (cfg.apiAuto === false && !cfg.isInfra && cfg.key !== 'perplexity') ? `
      <button class="cost-manual-btn" onclick="promptManual('${cfg.key}','${cfg.label}')">✏️ 직접입력</button>` : '';

    const noteText = cfg.note ? `<div style="font-size:.65rem;color:#334155;margin-top:4px">${cfg.note}</div>` : '';

    const logoHtml = cfg.logo ? `<img src="${cfg.logo}" style="width:20px;height:20px;border-radius:4px;margin-right:6px;vertical-align:middle" onerror="this.style.display='none'">` : (cfg.emoji || '');
    const statusBadge = cfg.isActive === false ? `<span style="font-size:.6rem;padding:2px 8px;border-radius:12px;background:#374151;color:#9ca3af;margin-left:6px">사용 안함</span>` : '';

    // 미니 카드 + 결제 정보
    let billingInfo = '';
    if (cfg.card && CARD_STYLES[cfg.card]) {
      const cs = CARD_STYLES[cfg.card];
      const typeLabel = cfg.billingType === 'monthly' ? '월결제' : cfg.billingType === 'annual' ? '연간' : cfg.billingType === 'prepaid' ? '충전식' : '무료';
      const nextBill = cfg.nextDate ? cfg.nextDate :
        (cfg.billingDay && cfg.billingType === 'monthly') ? (() => {
          const now = new Date(); const day = cfg.billingDay;
          const next = new Date(now.getFullYear(), now.getMonth(), day);
          if (next <= now) next.setMonth(next.getMonth() + 1);
          return next.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
        })() : null;
      billingInfo = `
      <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
        <div style="width:48px;height:30px;border-radius:5px;background:${cs.bg};border:1px solid rgba(255,255,255,0.1);display:flex;flex-direction:column;justify-content:center;padding:0 5px;flex-shrink:0;position:relative;overflow:hidden">
          <div style="position:absolute;right:3px;top:3px;width:8px;height:6px;border-radius:50%;background:${cs.chip};opacity:.8"></div>
          <div style="font-size:.42rem;color:rgba(255,255,255,.5);line-height:1">💳</div>
          <div style="font-size:.38rem;color:rgba(255,255,255,.7);letter-spacing:.5px;margin-top:1px">••${cs.name.slice(-4)}</div>
        </div>
        <div style="font-size:.6rem;color:#64748b;line-height:1.4">
          <span style="background:#1e3a5f;color:#60a5fa;padding:1px 5px;border-radius:3px;font-size:.55rem">${typeLabel}</span>
          ${nextBill ? `<span style="margin-left:4px;color:#94a3b8">다음 ${nextBill}</span>` : ''}
        </div>
      </div>`;
    } else if (cfg.billingType === 'free') {
      billingInfo = `<div style="font-size:.58rem;color:#22c55e;margin-top:5px">🆓 무료</div>`;
    } else if (cfg.billingType === 'prepaid') {
      billingInfo = `<div style="font-size:.58rem;color:#f59e0b;margin-top:5px">💰 충전식 선불</div>`;
    }

    const cardOpacity = cfg.isActive === false ? 'opacity:0.6;' : '';
    return `<div class="cost-card" style="${cardOpacity}cursor:pointer" onclick="showCostDetail('${cfg.key}')">
      <div class="cost-header"><span class="cost-name">${logoHtml}${cfg.label}${statusBadge}</span></div>
      <div class="cost-rows">${subRow}${apiRow}${infraRow}${creditRow}</div>
      ${totalRow}
      ${billingInfo}
      ${manualBtn}
      ${noteText}
      <a class="cost-link" href="${cfg.dashboard}" target="_blank">↗ 대시보드</a>
    </div>`;
  }).join('');

  grid.innerHTML = cards;

  // 총합계 업데이트
  const grand = sumSub + sumApi + sumInfra;
  document.getElementById('sum-sub').textContent = `$${sumSub.toFixed(2)}`;
  document.getElementById('sum-api').textContent = sumApi > 0 ? `$${sumApi.toFixed(2)}` : '—';
  document.getElementById('sum-infra').textContent = `$${sumInfra.toFixed(2)}`;
  document.getElementById('sum-grand').textContent = `총 $${grand.toFixed(2)}/월`;
  const mo = workerData && workerData._month ? workerData._month : new Date().toISOString().slice(0,7);
  document.getElementById('sum-note').textContent = `${mo} 기준 · DeepSeek/OpenAI 자동조회 · 나머지 수동`;
}

function promptManual(key, label) {
  const cur = getManualCosts()[key];
  const val = prompt(`${label} API 이달 사용액 (USD 숫자만, 예: 3.50)`, cur !== undefined ? cur : '');
  if (val === null) return;
  const n = parseFloat(val);
  if (isNaN(n) || n < 0) { alert('숫자를 입력하세요'); return; }
  setManualCost(key, n);
  loadAiCosts();
}

async function load() {
  let services = [];
  try {
    const r = await fetch('/api/services?t=' + Date.now());
    services = await r.json();
  } catch(e) {}
  ALL_SERVICES = services;

  let stats = {};
  try {
    const r = await fetch('/api/stats?t=' + Date.now());
    stats = await r.json();
  } catch(e) {}

  document.getElementById('last-updated').textContent = '마지막 열람: ' + new Date().toLocaleString('ko-KR');

  renderGrid(services, IS_OWNER, stats);
  loadAiCosts();
  if (IS_OWNER) applyOwnerView();
}

function renderGrid(services, isOwner, stats) {
  const visible = isOwner ? services : services.filter(s => s.visible);
  document.getElementById('svc-label').textContent = isOwner
    ? `🚀 서비스 (${visible.length}개 전체 — 오너뷰)`
    : `🚀 서비스 (${visible.length})`;

  document.getElementById('grid').innerHTML = visible.map(s => {
    const svc_stats = (stats && stats[s.id]) ? stats[s.id] : {};
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate() - i);
      const key = d.toISOString().slice(0, 10);
      days.push({key, count: svc_stats[key] || 0, isToday: key === TODAY});
    }
    const max = Math.max(...days.map(d => d.count), 1);
    const totalClicks = Object.values(svc_stats).reduce((a, b) => a + b, 0);
    const bars = days.map(d => {
      const h = Math.max(2, Math.round(d.count/max*26));
      const numCls = d.isToday ? 'sn-today' : (d.count === 0 ? 'sn-zero' : '');
      const numTxt = d.count > 0 ? (d.count >= 1000 ? (d.count/1000).toFixed(1)+'k' : d.count) : '0';
      return `<div class="spark-col" title="${d.key}: ${d.count}회">` +
        `<span class="spark-num ${numCls}">${numTxt}</span>` +
        `<div class="sparkline-bar${d.isToday?' today':''}" style="height:${h}px"></div>` +
        `</div>`;
    }).join('');

    const isHidden = !s.visible;
    const dot = isHidden
      ? `<span class="hidden-dot" title="숨김"></span>`
      : `<span class="live-dot"></span>`;

    const toggleBtn = isOwner
      ? `<button class="toggle-vis${s.visible?' visible':''}" onclick="toggleVisibility('${s.id}',${!s.visible},event)" title="${s.visible?'숨기기':'공개하기'}">${s.visible?'👁 공개':'🙈 숨김'}</button>`
      : '';

    return `
      <div class="card${isHidden?' hidden-card':''}" data-id="${s.id}"${isOwner?' draggable="true"':''} onclick="trackClick('${s.id}','${s.url}')">
        ${toggleBtn}
        <div class="card-top">
          <span class="card-icon">${s.icon}</span>
          <span class="card-name">${s.name}</span>
          ${dot}
        </div>
        <div class="card-desc">${s.desc}</div>
        <div class="card-footer">
          <span class="card-clicks">누적 ${totalClicks.toLocaleString()}회</span>
          <div class="sparkline">${bars}</div>
        </div>
      </div>`;
  }).join('');
}

// ── 드래그 앤 드롭 순서 변경 ──────────────────────────────
let dragSrc = null;
let dragSaveTimer = null;

function initDrag() {
  const grid = document.getElementById('grid');
  if (!grid) return;

  // 마우스 드래그
  grid.addEventListener('dragstart', e => {
    const card = e.target.closest('.card[draggable]');
    if (!card) return;
    dragSrc = card;
    card.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', card.dataset.id);
  });
  grid.addEventListener('dragend', e => {
    const card = e.target.closest('.card');
    if (card) card.classList.remove('dragging');
    grid.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
    dragSrc = null;
  });
  grid.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const card = e.target.closest('.card[draggable]');
    if (card && card !== dragSrc) {
      grid.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
      card.classList.add('drag-over');
    }
  });
  grid.addEventListener('dragleave', e => {
    const card = e.target.closest('.card');
    if (card) card.classList.remove('drag-over');
  });
  grid.addEventListener('drop', e => {
    e.preventDefault();
    const target = e.target.closest('.card[draggable]');
    if (!target || !dragSrc || target === dragSrc) return;
    target.classList.remove('drag-over');
    const allCards = [...grid.querySelectorAll('.card')];
    const si = allCards.indexOf(dragSrc);
    const ti = allCards.indexOf(target);
    if (si < ti) grid.insertBefore(dragSrc, target.nextSibling);
    else grid.insertBefore(dragSrc, target);
    persistOrder();
  });

  // 터치 드래그 (모바일)
  let touchCard = null, touchClone = null, touchOffX = 0, touchOffY = 0;
  grid.addEventListener('touchstart', e => {
    const card = e.target.closest('.card[draggable]');
    if (!card) return;
    const t = e.touches[0];
    const rect = card.getBoundingClientRect();
    touchOffX = t.clientX - rect.left;
    touchOffY = t.clientY - rect.top;
    touchCard = card;
    touchClone = card.cloneNode(true);
    touchClone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:.7;z-index:999;pointer-events:none;border:1px solid #facc15;border-radius:10px;transition:none`;
    document.body.appendChild(touchClone);
    card.classList.add('dragging');
  }, {passive:true});
  grid.addEventListener('touchmove', e => {
    if (!touchCard || !touchClone) return;
    e.preventDefault();
    const t = e.touches[0];
    touchClone.style.left = (t.clientX - touchOffX) + 'px';
    touchClone.style.top  = (t.clientY - touchOffY) + 'px';
    touchClone.style.display = 'none';
    const el = document.elementFromPoint(t.clientX, t.clientY);
    touchClone.style.display = '';
    grid.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
    const over = el && el.closest('.card[draggable]');
    if (over && over !== touchCard) over.classList.add('drag-over');
  }, {passive:false});
  grid.addEventListener('touchend', e => {
    if (!touchCard) return;
    const t = e.changedTouches[0];
    if (touchClone) { touchClone.remove(); touchClone = null; }
    touchCard.classList.remove('dragging');
    grid.querySelectorAll('.drag-over').forEach(c => c.classList.remove('drag-over'));
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const target = el && el.closest('.card[draggable]');
    if (target && target !== touchCard) {
      const allCards = [...grid.querySelectorAll('.card')];
      const si = allCards.indexOf(touchCard);
      const ti = allCards.indexOf(target);
      if (si < ti) grid.insertBefore(touchCard, target.nextSibling);
      else grid.insertBefore(touchCard, target);
      persistOrder();
    }
    touchCard = null;
  }, {passive:true});
}

function persistOrder() {
  const grid = document.getElementById('grid');
  const ids = [...grid.querySelectorAll('.card')].map(c => c.dataset.id);
  ALL_SERVICES.sort((a, b) => {
    const ai = ids.indexOf(a.id), bi = ids.indexOf(b.id);
    return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
  });
  clearTimeout(dragSaveTimer);
  dragSaveTimer = setTimeout(async () => {
    try {
      await fetch('/api/admin-save', {
        method: 'POST',
        headers: {'Content-Type':'application/json','X-Admin-Token': OWNER_TOKEN},
        body: JSON.stringify(ALL_SERVICES)
      });
      showToast();
    } catch(e) { console.warn('순서 저장 실패', e); }
  }, 400);
}

function showToast() {
  const t = document.getElementById('drag-toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

async function toggleVisibility(id, newVisible, e) {
  e.stopPropagation();
  const svc = ALL_SERVICES.find(s => s.id === id);
  if (!svc) return;
  svc.visible = newVisible;
  // KV에 저장
  try {
    await fetch('/api/admin-save', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-Admin-Token': OWNER_TOKEN},
      body: JSON.stringify(ALL_SERVICES)
    });
  } catch(e) {}
  renderGrid(ALL_SERVICES, true);
}

async function trackClick(id, url) {
  try {
    await fetch('/api/click', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({id, date: TODAY})
    });
  } catch(e) {}
  window.open(url, '_blank', 'noopener');
}

load();
</script>

      </div>`;
    }).join('');
    document.getElementById('usage-legend').innerHTML = legendHtml;
    
    // Chart.js
    const numDays = data.labels ? data.labels.length : 14;
    const minWidth = Math.max(600, numDays * 40);
    document.getElementById('usageChart').style.minWidth = minWidth + 'px';
    const ctx = document.getElementById('usageChart').getContext('2d');
    usageChart = new Chart(ctx, {
      type: 'line',
      data: data,
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1e293b',
            borderColor: '#4ade80',
            borderWidth: 1,
            titleColor: '#e2e8f0',
            bodyColor: '#94a3b8',
            callbacks: {
              label: ctx => { const v = ctx.parsed.y; return v >= 1e6 ? `${ctx.dataset.label}: ${(v/1e6).toFixed(2)}M tokens` : `${ctx.dataset.label}: ${(v/1e3).toFixed(1)}K tokens`; }
            }
          }
        },
        scales: {
          x: {
            stacked: true,
            grid: { color: 'rgba(148,163,184,0.1)' },
            ticks: { color: '#94a3b8', font: { size: 10 } }
          },
          y: {
            stacked: true,
            grid: { color: 'rgba(148,163,184,0.1)' },
            ticks: {
              color: '#94a3b8',
              font: { size: 10 },
              callback: v => v >= 1e6 ? `${(v/1e6).toFixed(1)}M` : `${(v/1e3).toFixed(0)}K`
            }
          }
        },
        elements: {
          line: { tension: 0.3 },
          point: { radius: 0 }
        }
      }
    });
  } catch (e) {
    console.error('사용량 그래프 로드 실패:', e);
  }
}

function toggleDataset(idx) {
  const el = document.getElementById(`legend-${idx}`);
  if (visibleDatasets.has(idx)) {
    visibleDatasets.delete(idx);
    el.classList.remove('active');
    el.style.opacity = '0.4';
    el.style.borderColor = 'transparent';
    usageChart.setDatasetVisibility(idx, false);
  } else {
    visibleDatasets.add(idx);
    el.classList.add('active');
    el.style.opacity = '1';
    el.style.borderColor = usageChart.data.datasets[idx].borderColor;
    usageChart.setDatasetVisibility(idx, true);
  }
  usageChart.update();
}

// 초기 로드
loadUsageChart();

// ── 작업유형별 비용 분석 ──────────────────────────────────
async function loadSourceAnalysis() {
  try {
    const r = await fetch('/api/usage-chart?type=source');
    if (!r.ok) return;
    const d = await r.json();
    const sources = d.sources || [];
    const maxCost = Math.max(...sources.map(s => s.cost_usd), 0.001);

    const SOURCE_ICONS = {
      'Discord': '💬', 'Telegram': '📱', '크론작업': '⏰',
      '서브에이전트': '🤖', 'CLI': '💻', '기타': '❓'
    };

    const html = sources.map(s => {
      const pct = Math.round((s.cost_usd / maxCost) * 100);
      const icon = SOURCE_ICONS[s.source] || '❓';
      const tokStr = s.tokens >= 1e6 ? `${(s.tokens/1e6).toFixed(1)}M` : `${(s.tokens/1000).toFixed(0)}K`;
      const modelBreakdown = Object.entries(s.model_breakdown || {})
        .map(([m,c]) => `${m} $${c.toFixed(2)}`).join(' · ');
      return `<div style="display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center;padding:8px;background:#0f172a;border-radius:8px">
        <div style="font-size:.8rem;color:#e2e8f0;white-space:nowrap">${icon} ${s.source}</div>
        <div style="position:relative;height:6px;background:#1e293b;border-radius:3px;overflow:hidden">
          <div style="position:absolute;left:0;top:0;height:100%;width:${pct}%;background:linear-gradient(90deg,#3b82f6,#8b5cf6);border-radius:3px;transition:width .5s"></div>
        </div>
        <div style="text-align:right;min-width:120px">
          <div style="font-size:.8rem;color:#e2e8f0;font-weight:600">$${s.cost_usd.toFixed(2)}</div>
          <div style="font-size:.65rem;color:#475569">${tokStr} · ${s.sessions}세션 · top: ${s.top_model}</div>
        </div>
      </div>
      <div style="font-size:.65rem;color:#334155;padding:0 8px 4px;margin-top:-4px">${modelBreakdown}</div>`;
    }).join('');

    document.getElementById('source-analysis').innerHTML = html ||
      '<div style="color:#475569;font-size:.8rem">데이터 없음</div>';
  } catch(e) { console.error('소스 분석 로드 실패:', e); }
}
loadSourceAnalysis();
</script>
