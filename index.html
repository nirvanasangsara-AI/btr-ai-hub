<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>BTR AI Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Pretendard',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh}
.header{padding:24px;border-bottom:1px solid #1e293b;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:1.1rem;font-weight:700;color:#fff;letter-spacing:-.3px}
.logo span{color:#4ade80}
.admin-link{font-size:.75rem;color:#475569;text-decoration:none;padding:4px 10px;border:1px solid #1e293b;border-radius:6px}
.admin-link:hover{color:#94a3b8;border-color:#334155}
.subtitle{text-align:center;padding:32px 24px 8px;color:#64748b;font-size:.85rem}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;padding:16px 24px 40px}
.card{background:#1e293b;border:1px solid #334155;border-radius:10px;padding:16px;text-decoration:none;color:inherit;display:block;transition:all .15s}
.card:hover{border-color:#4ade80;transform:translateY(-2px);box-shadow:0 4px 20px rgba(74,222,128,.1)}
.card-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.card-icon{font-size:1.3rem}
.card-name{font-size:.9rem;font-weight:600;color:#f1f5f9}
.card-desc{font-size:.78rem;color:#64748b;line-height:1.5}
.live-dot{width:6px;height:6px;background:#4ade80;border-radius:50%;margin-left:auto;flex-shrink:0;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.empty{text-align:center;padding:60px;color:#475569}
.loading{text-align:center;padding:60px;color:#475569}
</style>
</head>
<body>
<div class="header">
  <div class="logo">BTR <span>AI</span> Hub</div>
  <a href="/admin.html" class="admin-link">⚙️ 관리</a>
</div>
<p class="subtitle" id="subtitle">서비스 불러오는 중…</p>
<div class="grid" id="grid"><div class="loading">로딩 중…</div></div>
<script>
async function load() {
  try {
    const res = await fetch('/services.json?t=' + Date.now());
    const all = await res.json();
    const visible = all.filter(s => s.visible);
    document.getElementById('subtitle').textContent = `BTR 수성 내부 서비스 ${visible.length}개`;
    document.getElementById('grid').innerHTML = visible.length ? visible.map(s => `
      <a class="card" href="${s.url}" target="_blank" rel="noopener">
        <div class="card-top">
          <span class="card-icon">${s.icon}</span>
          <span class="card-name">${s.name}</span>
          <span class="live-dot"></span>
        </div>
        <div class="card-desc">${s.desc}</div>
      </a>
    `).join('') : '<div class="empty">공개된 서비스가 없습니다</div>';
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="empty">로드 실패 — 잠시 후 새로고침</div>';
  }
}
load();
</script>
</body>
</html>
