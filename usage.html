<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BTR AI 사용량 분석</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #e2e8f0;
      padding: 20px;
      min-height: 100vh;
    }
    .container { max-width: 1400px; margin: 0 auto; }
    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      color: #94a3b8;
      margin-bottom: 30px;
      font-size: 0.9rem;
    }
    .chart-wrapper {
      background: rgba(30, 41, 59, 0.6);
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      margin-bottom: 30px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }
    .stat-card {
      background: rgba(30, 41, 59, 0.6);
      border-radius: 8px;
      padding: 20px;
      border-left: 3px solid #8b5cf6;
    }
    .stat-label {
      font-size: 0.8rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .stat-value {
      font-size: 1.8rem;
      font-weight: 700;
      margin-top: 5px;
    }
    .legend-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(148, 163, 184, 0.1);
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    .legend-item:hover {
      background: rgba(148, 163, 184, 0.2);
    }
    .legend-item.active {
      border-color: currentColor;
    }
    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📊 BTR AI 사용량 분석</h1>
    <div class="subtitle">모델별·시간별 토큰 사용량 — 최근 30일</div>
    
    <div class="stats-grid" id="stats"></div>
    
    <div class="chart-wrapper">
      <canvas id="usageChart"></canvas>
      <div class="legend-filter" id="legendFilter"></div>
    </div>
  </div>

  <script>
    let chart;
    const visibleDatasets = new Set();

    async function loadData() {
      const r = await fetch('/api/usage-chart');
      const data = await r.json();
      
      // 통계 계산
      const stats = {};
      data.datasets.forEach(ds => {
        const total = ds.data.reduce((a, b) => a + b, 0);
        stats[ds.label] = total;
      });
      
      const grandTotal = Object.values(stats).reduce((a, b) => a + b, 0);
      
      // 통계 카드
      const statsHtml = Object.entries(stats).map(([model, tokens]) => {
        const pct = ((tokens / grandTotal) * 100).toFixed(1);
        return `
          <div class="stat-card">
            <div class="stat-label">${model}</div>
            <div class="stat-value">${(tokens / 1000).toFixed(1)}K</div>
            <div style="font-size:0.9rem;color:#94a3b8;margin-top:5px">${pct}% of total</div>
          </div>
        `;
      }).join('');
      
      document.getElementById('stats').innerHTML = statsHtml + `
        <div class="stat-card" style="border-left-color:#06b6d4">
          <div class="stat-label">Total</div>
          <div class="stat-value">${(grandTotal / 1000).toFixed(1)}K</div>
          <div style="font-size:0.9rem;color:#94a3b8;margin-top:5px">tokens</div>
        </div>
      `;
      
      // 범례 필터
      const legendHtml = data.datasets.map((ds, idx) => {
        visibleDatasets.add(idx);
        return `
          <div class="legend-item active" data-idx="${idx}" style="color:${ds.borderColor}">
            <div class="legend-dot" style="background:${ds.backgroundColor}"></div>
            <span>${ds.label}</span>
          </div>
        `;
      }).join('');
      document.getElementById('legendFilter').innerHTML = legendHtml;
      
      // Chart.js
      const ctx = document.getElementById('usageChart').getContext('2d');
      chart = new Chart(ctx, {
        type: 'line',
        data: data,
        options: {
          responsive: true,
          interaction: {
            mode: 'index',
            intersect: false
          },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: ctx => `${ctx.dataset.label}: ${(ctx.parsed.y / 1000).toFixed(1)}K tokens`
              }
            }
          },
          scales: {
            x: {
              grid: { color: 'rgba(148,163,184,0.1)' },
              ticks: { color: '#94a3b8' }
            },
            y: {
              stacked: true,
              grid: { color: 'rgba(148,163,184,0.1)' },
              ticks: {
                color: '#94a3b8',
                callback: v => `${(v / 1000).toFixed(0)}K`
              }
            }
          },
          elements: {
            line: { tension: 0.4 },
            point: { radius: 3 }
          }
        }
      });
      
      // 범례 클릭
      document.querySelectorAll('.legend-item').forEach(el => {
        el.addEventListener('click', () => {
          const idx = parseInt(el.dataset.idx);
          if (visibleDatasets.has(idx)) {
            visibleDatasets.delete(idx);
            el.classList.remove('active');
            chart.setDatasetVisibility(idx, false);
          } else {
            visibleDatasets.add(idx);
            el.classList.add('active');
            chart.setDatasetVisibility(idx, true);
          }
          chart.update();
        });
      });
    }

    loadData();
  </script>
</body>
</html>
